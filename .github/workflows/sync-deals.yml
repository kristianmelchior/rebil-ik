name: Sync HubSpot deals

on:
  schedule:
    # Mon–Fri work hours (8:45–17:15 CET = 7:45–16:15 UTC): every 15 min
    - cron: '45 7 * * 1-5'
    - cron: '0,15,30,45 8-15 * * 1-5'
    - cron: '0,15 16 * * 1-5'
    # Mon–Fri off-hours: every hour
    - cron: '0 0-7 * * 1-5'
    - cron: '0 17-23 * * 1-5'
    # Weekends: every hour
    - cron: '0 * * * 0,6'
  workflow_dispatch:           # manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: sync/requirements.txt

      - name: Install dependencies
        run: pip install -r sync/requirements.txt

      - name: Run sync
        working-directory: sync
        env:
          HUBSPOT_API_KEY:      ${{ secrets.HUBSPOT_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python sync.py
